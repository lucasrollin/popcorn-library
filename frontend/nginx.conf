server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing: serve index.html for any unmatched path so
    # React Router can handle it (e.g. /lists/42 on a hard refresh).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
