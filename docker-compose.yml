services:
  db:
    image: postgres:16-alpine
    container_name: popcorn-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: popcorn-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # App config (PORT, TMDB_*, SESSION_*) comes from backend/.env; we
    # override DATABASE_URL so it targets the db SERVICE, not localhost.
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NODE_ENV: production
    # Apply pending migrations before starting the server.
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: popcorn-frontend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: popcorn-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
